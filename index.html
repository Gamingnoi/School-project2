<body>

<button onclick="spin()">SPIN</button>
<br>
<canvas id="wheel" width="900" height="900"></canvas>

let spinning = false;

let blockedNames = [
"Matas B. IVa", "Smiltė L. IVd", "Justina G. IVa", "Enėja T. IVc", "Arnas B. IVb", "Rūta Z. IVd", "Tomas Ž. IVb", "Ula M. IVd", "Jokūbas G. IVb", "Ariana G. IVc",
"Titas P. IVb", "Simonas M. IVe", "Gerda T. IVc", "Hubertas S. IVb", "Rugilė R. IVd", "Arnas K. IVb", "Emilija A. IVa", "Danielius M. IVa", "Izabelė M. IVa", "Živilė V. IVa",
"Augustė T. IVd", "Ainius R. IVb", "Saulė G. IVa", "Kamilė M. IVa", "Gabrielė S. IVc", "Urtė U. IVc", "Eleonora P. IVc", "Ervinas Š. IVd", "Aivija D. IVa", "Žilvinas E. IVd",
"Arminas J. IVb", "Goda S. IVb", "Akvilė R. IVe", "Marija Ieva R. IVc", "Orestas N. IVe", "Saulė J. IVc", "Liutauras P. IVd", "Rytis V. IVd", "Liepa P. IVd", "Lukas G. IVc",
"Marija R. IVe", "Greta S. IVb", "Viktorija U. IVd", "Benediktas Ž. IVa"
];

const pastelColors = [
  "#FFB3BA","#FFDFBA","#FFFFBA",
  "#BAFFC9","#BAE1FF","#D5BAFF"
];

function drawPointer() {
  const radius = canvas.width / 2;
  const pointerLength = 30; // distance beyond the wheel edge
  const pointerWidth = 20;  // width of the triangle

  ctx.save();
  ctx.fillStyle = "red";

  // Move origin to the center of the wheel
  ctx.translate(radius, radius);

  ctx.beginPath();
  // Tip of the pointer: just outside the wheel to the right
  ctx.moveTo(radius + pointerLength, 0);
  // Base of the triangle: at the wheel edge
  ctx.lineTo(radius, -pointerWidth / 2);
  ctx.lineTo(radius, pointerWidth / 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawWheel() {
  const radius = canvas.width / 2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.translate(radius,radius);

  const slice = 2*Math.PI/items.length;

  items.forEach((item,i)=>{
    ctx.beginPath();
    ctx.fillStyle = pastelColors[i % pastelColors.length];
    ctx.moveTo(0,0);
    ctx.arc(0,0,radius,i*slice+angle,(i+1)*slice+angle);
    ctx.fill();

    const textAngle = i*slice + slice/2 + angle;
    const textRadius = radius*0.38;

    ctx.save();
    ctx.rotate(textAngle);
    ctx.translate(textRadius,0);

    ctx.font="bold 16px Arial";
    ctx.textAlign="left";
    ctx.textBaseline="middle";
    ctx.fillStyle="#000";
    ctx.fillText(item,0,0);

    ctx.restore();
  });

  ctx.setTransform(1,0,0,1,0,0);
    drawPointer();
}

function displayWinner(name){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let size=60;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillStyle="#FFD700";

  do{
    ctx.font=`bold ${size}px Arial`;
    size--;
  }while(ctx.measureText(name).width>canvas.width*0.8);

  ctx.fillText(name,canvas.width/2,canvas.height/2);
}

function spin(){
  if(spinning) return;

  const eligible = items.filter(n => !blockedNames.includes(n));
  if(eligible.length === 0){
    alert("No eligible names left.");
    return;
  }

  spinning = true;

  let velocity = Math.random()*0.6 + 0.9;
  const decay = 0.9; // lower -> faster

  function animate(){
    velocity *= decay;
    angle += velocity;
    drawWheel();

    if(velocity > 0.002){
      requestAnimationFrame(animate);
    } else {

      const slice = 2*Math.PI/items.length;
      let finalAngle = (2*Math.PI - angle%(2*Math.PI))%(2*Math.PI);
      let winnerIndex = Math.floor(finalAngle/slice);
      let winner = items[winnerIndex];

      // If blocked → move forward to next valid slice
      while(blockedNames.includes(winner)){
        winnerIndex = (winnerIndex + 1) % items.length;
        winner = items[winnerIndex];
      }

      setTimeout(()=>{
        displayWinner(winner);
        items = items.filter(name => name !== winner);
        spinning=false;
      },150);
    }
  }

  animate();
}

drawWheel();
</script>

</body>
</html>
